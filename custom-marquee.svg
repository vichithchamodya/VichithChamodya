      <style>
        .container {
          width: 100%;
          height: 50px;
          display: flex;
          justify-content: center;
          align-items: center;
          background: transparent;
        }
        
        .marquee {
          width: 100%;
          height: 50px;
          overflow: hidden;
          position: relative;
          background: transparent;
          -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
          mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
        }
        
        .marquee div {
          display: block;
          width: 200%;
          height: 50px;
          position: absolute;
          overflow: hidden;
          animation: marquee 26s linear infinite;
          font-family: poppins;
          font-size: 20px;
          line-height: 50px;
          text-align: center;
        }
        
        @keyframes marquee {
          0% { left: 0; }
          100% { left: -100%; }
        }
